# ============================================================
# TAREA: Reemplazar onboarding modal por spotlight tour reactivo
# PROYECTO: HoneyBalance · Vista Personal (V2)
# STACK: Angular 20 · SCSS · Signals · localStorage
# SCOPE: Solo archivos del módulo personal (no afectar admin)
# ============================================================

task: "Implementar sistema de spotlight tour interactivo"
priority: high
sequential: true
verify_acceptance_criteria_before_done: true

context:
  project: HoneyBalance
  module: personal-v2
  current_problem: |
    El onboarding actual usa un modal de 4 pasos genérico que:
    - No señala elementos reales de la UI
    - No tiene feedback contextual (por qué / cómo)
    - No detecta cuando el usuario completa una acción
    - No se actualiza en tiempo real
  target_behavior: |
    Tour tipo Gamma/Shepherd.js:
    - Overlay oscuro con recorte tipo spotlight sobre el elemento target
    - Tooltip posicionado dinámicamente (top/bottom/left/right)
    - Cada paso tiene sección "¿Por qué?" y "¿Cómo se usa?"
    - Auto-avance cuando el usuario completa la acción del paso
    - Indicador de progreso (dots) en tiempo real

constraints:
  - Solo modificar archivos dentro de src/app/personal/
  - No tocar admin/, empresarial/, o archivos de routing principal
  - Mantener la key de localStorage hb-v1-onboarded para compatibilidad
  - Usar Angular Signals (no BehaviorSubject ni EventEmitter)
  - Todo el CSS con variables SCSS del sistema --hb-* existente
  - Sin librerías externas (Shepherd.js, Driver.js, Intro.js)
  - Compatible con Angular 20 standalone components

steps:

  - step: 1
    name: "Crear TourService"
    file: src/app/personal/services/tour.service.ts
    action: create
    spec: |
      Servicio standalone con:
      
      Interfaces:
        TourStep {
          id: string
          targetSelector: string        // CSS selector del elemento
          title: string
          why: string                   // Sección "¿Por qué?"
          how: string                   // Sección "¿Cómo se usa?"
          position: 'top'|'bottom'|'left'|'right'
          icon: string                  // clase de Iconify/Lucide
          completionEvent?: string      // nombre del evento DOM a escuchar
        }
      
      State (Signals):
        currentStepIndex = signal<number>(-1)
        isActive = computed(() => currentStepIndex() >= 0)
        currentStep = computed(() => steps[currentStepIndex()] ?? null)
      
      Constantes:
        PERSONAL_TOUR_STEPS: TourStep[] = [
          {
            id: 'summary-cards',
            targetSelector: '[data-tour="summary-cards"]',
            title: 'Tu resumen financiero',
            why: 'Aquí ves en tiempo real cuánto tienes, cuánto ganaste y cuánto gastaste en el mes actual.',
            how: 'Estas tarjetas se actualizan automáticamente con cada movimiento que registres.',
            position: 'bottom',
            icon: 'chart-pie'
          },
          {
            id: 'add-movement',
            targetSelector: '[data-tour="add-movement"]',
            title: 'Registrar movimientos',
            why: 'Cada ingreso o gasto registrado se categoriza automáticamente y alimenta tu resumen.',
            how: 'Toca este botón para abrir el formulario. Monto, categoría y descripción. Menos de 10 segundos.',
            position: 'left',
            icon: 'plus',
            completionEvent: 'hb:movement-modal-opened'
          },
          {
            id: 'savings-goals',
            targetSelector: '[data-tour="savings-goals"]',
            title: 'Metas de ahorro',
            why: 'Las metas te ayudan a reservar dinero para objetivos concretos y hacen visible tu progreso.',
            how: 'Toca "+ Nueva meta" para definir objetivo y plazo. El avance se actualiza en tiempo real.',
            position: 'top',
            icon: 'target',
            completionEvent: 'hb:savings-modal-opened'
          },
          {
            id: 'entornos',
            targetSelector: '[data-tour="nav-entornos"]',
            title: 'Entornos Personales',
            why: 'Herramientas avanzadas: presupuesto 50/30/20, fondo de emergencia, deudas y más.',
            how: 'Haz clic aquí para explorar cada entorno. Cada uno da una perspectiva diferente de tu salud financiera.',
            position: 'right',
            icon: 'sparkles'
          }
        ]
      
      Métodos:
        start(): void
          - Si localStorage 'hb-v1-onboarded' === 'true', no iniciar
          - currentStepIndex.set(0)
          - Emitir evento DOM 'hb:tour-started' en document
        
        next(): void
          - Si currentStepIndex() < STEPS.length - 1: incrementar
          - Si es el último paso: llamar end()
        
        prev(): void
          - Si currentStepIndex() > 0: decrementar
        
        end(completed = false): void
          - currentStepIndex.set(-1)
          - Si completed: localStorage.setItem('hb-v1-onboarded', 'true')
          - Emitir evento DOM 'hb:tour-ended' en document
        
        skipTour(): void
          - Llamar end(true) para no volver a mostrar
        
        restartTour(): void
          - localStorage.removeItem('hb-v1-onboarded')
          - start()

  - step: 2
    name: "Crear TourOverlayComponent"
    file: src/app/personal/components/tour-overlay/tour-overlay.component.ts
    action: create
    spec: |
      Componente standalone, adjunto al body con ViewContainerRef o creado via ApplicationRef.
      
      Template (tour-overlay.component.html):
        <ng-container *ngIf="tourService.isActive()">
          
          <!-- SVG Spotlight overlay -->
          <svg class="hb-tour-svg" aria-hidden="true">
            <defs>
              <mask id="hb-spotlight-mask">
                <rect width="100%" height="100%" fill="white"/>
                <rect
                  [attr.x]="spotlight().x"
                  [attr.y]="spotlight().y"
                  [attr.width]="spotlight().w"
                  [attr.height]="spotlight().h"
                  rx="10" ry="10"
                  fill="black"
                />
              </mask>
            </defs>
            <rect width="100%" height="100%" fill="rgba(0,0,0,0.76)" mask="url(#hb-spotlight-mask)"/>
          </svg>
          
          <!-- Intro modal (step 0 especial) -->
          <div *ngIf="isIntroVisible()" class="hb-tour-intro" role="dialog">
            ... (4 dots vacíos, título, descripción, botones Saltar/Comenzar)
          </div>
          
          <!-- Tooltip posicionado -->
          <div
            *ngIf="currentStep()"
            class="hb-tour-tooltip"
            role="dialog"
            [style.left.px]="tooltipPos().left"
            [style.top.px]="tooltipPos().top"
          >
            <!-- Dots de progreso -->
            <!-- Icono + Título -->
            <!-- Sección ¿Por qué? (color dorado) -->
            <!-- Sección ¿Cómo se usa? (color celeste) -->
            <!-- Botones: Saltar | Atrás | Siguiente/Finalizar -->
          </div>
          
          <!-- Done modal (tras último paso) -->
          <div *ngIf="isDoneVisible()" class="hb-tour-done" role="dialog">
            ... (ícono check verde, mensaje, botón "Comenzar a usar")
          </div>
          
        </ng-container>
      
      Lógica TS:
        Inject TourService
        
        spotlight = computed(() => {
          const step = tourService.currentStep()
          if (!step) return { x: 0, y: 0, w: 0, h: 0 }
          const el = document.querySelector(step.targetSelector)
          if (!el) return { x: 0, y: 0, w: 0, h: 0 }
          const r = el.getBoundingClientRect()
          const PAD = 10
          return {
            x: r.left - PAD,
            y: r.top - PAD,
            w: r.width + PAD * 2,
            h: r.height + PAD * 2
          }
        })
        
        tooltipPos = computed(() => {
          const sp = spotlight()
          const step = tourService.currentStep()
          const TW = 260, TH = 240, GAP = 14
          let left = 0, top = 0
          switch(step?.position) {
            case 'bottom': left = sp.x + sp.w/2 - TW/2; top = sp.y + sp.h + GAP; break
            case 'top':    left = sp.x + sp.w/2 - TW/2; top = sp.y - TH - GAP;   break
            case 'left':   left = sp.x - TW - GAP;       top = sp.y + sp.h/2 - TH/2; break
            case 'right':  left = sp.x + sp.w + GAP;     top = sp.y + sp.h/2 - TH/2; break
          }
          // Clampar a viewport
          left = Math.max(12, Math.min(left, window.innerWidth - TW - 12))
          top  = Math.max(12, Math.min(top,  window.innerHeight - TH - 12))
          return { left, top }
        })
        
        // Recalcular spotlight cuando cambia el tamaño de ventana
        ngOnInit() {
          fromEvent(window, 'resize').pipe(
            debounceTime(100),
            takeUntilDestroyed()
          ).subscribe(() => { /* Signal reactivo se actualiza solo */ })
        }
        
        // Escuchar completionEvent de cada step
        effect(() => {
          const step = tourService.currentStep()
          if (step?.completionEvent) {
            const handler = () => tourService.next()
            document.addEventListener(step.completionEvent, handler, { once: true })
          }
        })
      
      SCSS (tour-overlay.component.scss):
        .hb-tour-svg {
          position: fixed;
          top: 0; left: 0;
          width: 100vw; height: 100vh;
          z-index: 1000;
          pointer-events: none;
        }
        
        .hb-tour-tooltip {
          position: fixed;
          z-index: 1001;
          width: 260px;
          background: var(--hb-surface-overlay, #1A2740);
          border: 1px solid rgba(var(--hb-gold-rgb), 0.3);
          border-radius: 12px;
          padding: 16px;
          
          .why-label { color: var(--hb-gold); }
          .how-label { color: var(--hb-info-blue, #38BDF8); }
          .body-text  { color: var(--hb-text-muted); font-size: 12px; line-height: 1.55; }
        }
        
        .hb-tour-intro,
        .hb-tour-done {
          position: fixed;
          top: 50%; left: 50%;
          transform: translate(-50%, -50%);
          z-index: 1001;
          background: var(--hb-surface-overlay);
          border-radius: 16px;
          padding: 28px;
          width: 310px;
          text-align: center;
        }

  - step: 3
    name: "Agregar atributos data-tour a la UI del dashboard personal"
    files:
      - src/app/personal/dashboard/dashboard.component.html
      - src/app/personal/layout/sidebar/sidebar.component.html
    action: modify
    spec: |
      En dashboard.component.html:
        - Al contenedor de las 3 tarjetas de resumen: agregar data-tour="summary-cards"
        - Al botón FAB de agregar movimiento: agregar data-tour="add-movement"
        - A la sección/card de metas de ahorro: agregar data-tour="savings-goals"
      
      En sidebar.component.html:
        - Al ítem de navegación "Entornos": agregar data-tour="nav-entornos"
      
      No cambiar ningún estilo, class, ni lógica existente.
      Solo agregar el atributo data-tour al elemento más envolvente y representativo.

  - step: 4
    name: "Emitir CustomEvents desde los modales existentes"
    files:
      - src/app/personal/modals/add-movement-modal/add-movement-modal.component.ts
      - src/app/personal/modals/new-savings-goal-modal/new-savings-goal-modal.component.ts
    action: modify
    spec: |
      En add-movement-modal.component.ts:
        - En el método que abre el modal (o en ngOnInit si es lazy):
          document.dispatchEvent(new CustomEvent('hb:movement-modal-opened'))
      
      En new-savings-goal-modal.component.ts:
        - En el método que abre el modal (o en ngOnInit):
          document.dispatchEvent(new CustomEvent('hb:savings-modal-opened'))
      
      No cambiar ninguna otra lógica del modal.

  - step: 5
    name: "Registrar TourOverlayComponent y auto-iniciar el tour"
    files:
      - src/app/personal/personal.component.ts
      - src/app/personal/personal.component.html
    action: modify
    spec: |
      En personal.component.ts:
        - Inject TourService
        - En ngOnInit: tourService.start()
          (El servicio ya verifica localStorage internamente)
        
        - Agregar método restartTour() para Configuración:
          restartTour() { this.tourService.restartTour() }
      
      En personal.component.html (al final del template):
        - Agregar <hb-tour-overlay /> (ya se posiciona en fixed)

  - step: 6
    name: "Eliminar modal de onboarding anterior"
    action: modify
    spec: |
      Buscar y eliminar:
        - El componente o fragmento HTML del onboarding modal anterior
          (el que tenía 4 puntos de progreso y botones Anterior/Siguiente sin spotlight)
        - Su referencia en el módulo o template donde se declaraba
        - La lógica que lo mostraba (probablemente un showOnboarding: boolean)
      
      NO eliminar:
        - La key localStorage 'hb-v1-onboarded' (se reutiliza)
        - Ningún otro modal del sistema
      
      Si existe OnboardingModalComponent como archivo separado, eliminar:
        - onboarding-modal.component.ts
        - onboarding-modal.component.html
        - onboarding-modal.component.scss

  - step: 7
    name: "Agregar enlace 'Reiniciar tour' en Configuración"
    file: src/app/personal/pages/settings/settings.component.html
    action: modify
    spec: |
      En la sección de "Ayuda" o al final de la página de configuración, agregar:
      
      <div class="hb-settings-row">
        <div>
          <span class="hb-settings-label">Tour interactivo</span>
          <span class="hb-settings-hint">Vuelve a ver el recorrido de introducción</span>
        </div>
        <button class="hb-btn hb-btn--ghost" (click)="restartTour()">
          Reiniciar tour
        </button>
      </div>

acceptance_criteria:
  - El tour inicia automáticamente para usuarios nuevos (sin hb-v1-onboarded en localStorage)
  - El tour NO inicia para usuarios que ya lo completaron o saltaron
  - Cada paso muestra un spotlight (overlay oscuro con recorte) sobre el elemento correcto
  - El tooltip se posiciona en la dirección configurada sin salirse del viewport
  - Las secciones "¿Por qué?" y "¿Cómo se usa?" aparecen con sus colores diferenciados
  - Al abrir el modal de movimientos durante el paso 2, el tour avanza automáticamente
  - Al abrir el modal de metas durante el paso 3, el tour avanza automáticamente
  - El botón "Saltar tour" marca el tour como completado (no vuelve a aparecer)
  - El botón "Finalizar →" en el último paso muestra el modal de done y marca como completado
  - Desde Configuración → Ayuda se puede reiniciar el tour
  - No hay regresión visual en ningún otro módulo (admin, empresarial, landing)
  - El overlay se adapta al resize de ventana sin quedar desposicionado

