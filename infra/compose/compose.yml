services:
  honeyback_api:
    image: ${HONEYBACK_API_IMAGE:-honeyback_api:local}
    environment:
      ASPNETCORE_URLS: http://+:80
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Docker}
      ConnectionStrings__conexion: ${API_DATABASE_URL}
      Jwt__Issuer: ${JWT_ISSUER:-HoneyBack}
      Jwt__Audience: ${JWT_AUDIENCE:-HoneyBack}
      Jwt__Key: ${JWT_KEY}
      Jwt__ExpiresInMinutes: ${JWT_EXPIRES_MINUTES:-60}
      Cors__AllowedOriginsCsv: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:4201}
      Swagger__Enabled: ${SWAGGER_ENABLED:-true}
      Database__ApplyMigrationsAtStartup: ${APPLY_MIGRATIONS_AT_STARTUP:-true}
      Resend__ApiKey: ${RESEND_API_KEY}
      Resend__FromEmail: ${RESEND_FROM_EMAIL:-noreply@honeybalance.online}
      Resend__FromName: ${RESEND_FROM_NAME:-HoneyBalance}
    networks:
      - honeyback-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  honeybalance_web:
    image: ${HONEYBALANCE_WEB_IMAGE:-honeybalance_web:local}
    depends_on:
      honeyback_api:
        condition: service_healthy
    networks:
      - honeyback-network
    restart: unless-stopped

  honeyanalytics:
    image: ${HONEYANALYTICS_IMAGE:-honeyanalytics:local}
    environment:
      DATABASE_URL: ${ANALYTICS_DATABASE_URL}
      JWT_SECRET: ${JWT_KEY}
      JWT_ISSUER: ${JWT_ISSUER:-HoneyBack}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-HoneyBack}
    networks:
      - honeyback-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/analytics/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  honeyback-network:
    driver: bridge
