services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID:-Express}
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - honeyback-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -Q "SELECT 1" -C -b -o /dev/null',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  honeyback_api:
    image: ${HONEYBACK_API_IMAGE:-honeyback_api:local}
    environment:
      ASPNETCORE_URLS: http://+:80
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Docker}
      ConnectionStrings__conexion: Server=sqlserver;Database=HoneyBalanceDB;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=True;MultipleActiveResultSets=true;Connection Timeout=60
      Jwt__Issuer: ${JWT_ISSUER:-HoneyBack}
      Jwt__Audience: ${JWT_AUDIENCE:-HoneyBack}
      Jwt__Key: ${JWT_KEY}
      Jwt__ExpiresInMinutes: ${JWT_EXPIRES_MINUTES:-60}
      Cors__AllowedOriginsCsv: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:4201}
      Swagger__Enabled: ${SWAGGER_ENABLED:-true}
      Database__ApplyMigrationsAtStartup: ${APPLY_MIGRATIONS_AT_STARTUP:-true}
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - honeyback-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  honeybalance_web:
    image: ${HONEYBALANCE_WEB_IMAGE:-honeybalance_web:local}
    depends_on:
      honeyback_api:
        condition: service_healthy
    networks:
      - honeyback-network
    restart: unless-stopped

volumes:
  sql_data:

networks:
  honeyback-network:
    driver: bridge
