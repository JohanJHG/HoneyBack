services:
  # ============================================
  # SQL Server Database
  # ============================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: honeyback_sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1434:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./backups:/var/opt/mssql/backup
    networks:
      - honeyback-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD}\" -Q \"SELECT 1\" -C -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  # ============================================
  # HoneyBack API (.NET 8)
  # ============================================
  honeyback_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: honeyback_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__conexion=Server=sqlserver;Database=HoneyBalanceDB;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=True;MultipleActiveResultSets=true;Connection Timeout=60
      - Jwt__Issuer=HoneyBack
      - Jwt__Audience=HoneyBack
      - Jwt__Key=${JWT_KEY}
      - Jwt__ExpiresInMinutes=60
      - Cors__AllowedOrigins__0=http://localhost:4200
      - Cors__AllowedOrigins__1=http://localhost:3000
    ports:
      - "5291:80"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - honeyback-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================
  # HoneyBalance Frontend (Angular)
  # ============================================
  honeybalance_web:
    build:
      context: ../../../Desktop/honeybalance/honeybalance-angular
      dockerfile: Dockerfile
    container_name: honeybalance_web
    ports:
      - "4200:80"
    depends_on:
      - honeyback_api
    networks:
      - honeyback-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  sql_data:
    driver: local

networks:
  honeyback-network:
    driver: bridge
