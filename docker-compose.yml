version: "3.9"

services:
  # ============================================
  # SQL Server Database
  # ============================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: honeyback_sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD:-Johan3208365126*}
      - MSSQL_PID=Express
    ports:
      - "1434:1433"  # Puerto 1434 en host (evita conflicto con SQL local)
    volumes:
      - sql_data:/var/opt/mssql
      - ./backups:/var/opt/mssql/backup
    networks:
      - honeyback-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Johan3208365126*' -Q 'SELECT 1' -C -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    # Limitar recursos (opcional pero recomendado)
    deploy:
      resources:
        limits:
          memory: 2G

  # ============================================
  # HoneyBack API
  # ============================================
  honeyback_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: honeyback_api
    environment:
      # Entorno ASP.NET Core
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      # Cadena de conexion (usa nombre del servicio 'sqlserver' como host)
      - ConnectionStrings__conexion=Server=sqlserver;Database=HoneyBalanceDB;User Id=sa;Password=${SA_PASSWORD:-Johan3208365126*};TrustServerCertificate=True;Encrypt=True;MultipleActiveResultSets=true;Connection Timeout=60
      # Configuracion JWT
      - Jwt__Issuer=HoneyBack
      - Jwt__Audience=HoneyBack
      - Jwt__Key=${JWT_KEY:-Johan3208365126*-SecureKey-2024-HoneyBalance!}
      - Jwt__ExpiresInMinutes=60
      # CORS (origenes permitidos separados por coma si se implementa lectura desde env)
      # - Cors__AllowedOrigins__0=http://localhost:4200
    ports:
      - "5291:80"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - honeyback-network
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    # Limitar recursos (opcional)
    deploy:
      resources:
        limits:
          memory: 512M

# ============================================
# Volumenes persistentes
# ============================================
volumes:
  sql_data:
    driver: local

# ============================================
# Redes
# ============================================
networks:
  honeyback-network:
    driver: bridge
